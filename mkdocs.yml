site_name: PyCanopy
site_url: https://pranav-walimbe.github.io/PyCanopy
repo_url: https://github.com/pranav-walimbe/PyCanopy
repo_name: pranav-walimbe/PyCanopy

theme:
  name: material
  palette:
    scheme: default
    primary: custom
    accent: custom
  logo: assets/pycanopy_logo3.png
  favicon: assets/pycanopy_logo3.png
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - toc.integrate
    - content.code.copy

extra_css:
  - stylesheets/extra.css

hooks:
  - hooks.py

nav:
  - Introduction:
    - Overview: index.md
    - Benchmarks: benchmarks.md
  - Quick Start: quickstart.md
  - API Reference:
    - SpatialFrame: api/spatial-frame.md
    - SpatialLazyFrame: api/lazy-frame.md
    - Aggregations: api/aggregations.md
    - Engine & Utilities: api/engine.md
    - Distance Operations: api/distance-operations.md
  - How It Works:
    - Query Planner: how-it-works/query-planner.md
    - Cost Model & Index Selection: how-it-works/cost-model.md
    - Execution Paths: how-it-works/execution-paths.md
    - Streaming Architecture: how-it-works/streaming.md
    - In-Memory Optimization: how-it-works/in-memory-optimization.md
  - Contributing: contributing.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            heading_level: 2

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - tables

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
