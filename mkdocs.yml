site_name: PyCanopy
site_url: https://pranav-walimbe.github.io/PyCanopy
repo_url: https://github.com/pranav-walimbe/PyCanopy
repo_name: pranav-walimbe/PyCanopy

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: deep-orange
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

extra_css:
  - stylesheets/extra.css

hooks:
  - hooks.py

nav:
  - Getting Started: index.md
  - Operations Reference: operations.md
  - How It Works: how-it-works.md
  - Benchmarks: benchmarks.md
  - API Reference: api-reference.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            heading_level: 2

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - tables

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
