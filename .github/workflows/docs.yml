name: Deploy docs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pip install "maturin>=1.0,<2.0" numpy pyarrow polars shapely "mkdocs-material>=9.0" "mkdocstrings[python]>=0.25"

      - name: Build pycanopy extension
        run: pip install -e .

      - name: Build and deploy
        run: mkdocs gh-deploy --force
