# PyCanopy SpatialBench — AWS run config.
# Fill in result_bucket and instance_profile, then run:
#   python -m bench.spatial_bench.aws_run
# AWS credentials come from your normal AWS setup (AWS_PROFILE / ~/.aws / SSO).

# required
result_bucket: pycanopy-bench-results
instance_profile: pycanopy-spatialbench

# run
region: us-west-2
instance_type: m7i.2xlarge
scale_factors: [1]
volume_gb: 60
max_runtime_min: 30  # watchdog hard-terminates the box after this many minutes

# data ({sf} is replaced per scale factor; default is the official public dataset)
data_template: s3://wherobots-examples/data/spatialbench/SpatialBench_sf{sf}

# source repo the box builds
repo_url: https://github.com/pranav-walimbe/PyCanopy.git
repo_branch: main
