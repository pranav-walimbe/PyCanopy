# PyCanopy SpatialBench bootstrap configuration.
# These values are substituted into bootstrap.sh before deployment as @@NAME@@ placeholders.

# required: S3 bucket to write charts and logs into
result_bucket: pycanopy-bench-results

# required: IAM instance profile the box assumes (read public S3 data + write result bucket)
instance_profile: pycanopy-spatialbench

# run
region: us-west-2
instance_type: m7i.2xlarge
volume_gb: 32
max_runtime_min: 30

# source repo the box builds
repo_url: https://github.com/pranav-walimbe/PyCanopy.git
repo_branch: main
